<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海士町飲食店情報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ocean: #1a3a4a;
      --ocean-mid: #2a5568;
      --sand: #f5f0e8;
      --cream: #faf8f4;
      --accent: #e05e2e;
      --accent-soft: #f0845a;
      --text-main: #1a1a1a;
      --text-muted: #777;
      --card-border: rgba(26,58,74,0.11);
      --closed-bg: #f2efe9;
      --closed-text: #aaa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* ── LANG BAR ── */
    .lang-bar {
      background: #12292e;
      display: flex;
      justify-content: flex-end;
      padding: 6px 16px;
      gap: 4px;
    }
    .lang-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: all 0.18s;
    }
    .lang-btn.active, .lang-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── HEADER ── */
    header {
      background: var(--ocean);
      color: white;
      padding: 22px 20px 20px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content:''; position:absolute; bottom:-40px; right:-30px;
      width:200px; height:200px; border-radius:50%;
      background:rgba(255,255,255,0.04); pointer-events:none;
    }
    .site-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 21px;
      font-weight: 800;
      color: var(--sand);
      letter-spacing: 0.08em;
      line-height: 1.3;
    }
    .site-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em;
      margin-top: 3px;
      font-weight: 300;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .today-date {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 300;
    }
    .open-badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* ── TABS ── */
    .tabs {
      background: var(--ocean);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      padding: 0 12px;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display:none; }
    .tab-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      padding: 11px 12px 9px;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.18s;
      letter-spacing: 0.03em;
    }
    .tab-btn.active { color:white; border-bottom-color: var(--accent); font-weight:500; }
    .tab-btn:hover { color: rgba(255,255,255,0.8); }

    /* ── MAIN ── */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 14px 70px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 22px 0 10px;
      font-weight: 500;
    }
    .section-label:first-child { margin-top: 6px; }

    /* ── CARD ── */
    .card {
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px 16px 14px;
      margin-bottom: 10px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover { box-shadow: 0 4px 18px rgba(26,58,74,0.09); transform: translateY(-1px); }
    .card.closed { background: var(--closed-bg); border-color: transparent; }
    .card.closed:hover { transform:none; box-shadow:none; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 9px;
    }
    .shop-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ocean);
      line-height: 1.35;
    }
    .card.closed .shop-name { color: var(--closed-text); }

    .status-pill {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .pill-open { background: #e8f5e9; color: #2e7d32; }
    .pill-closed { background: #ebebeb; color: #999; }

    .dists {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 9px;
      align-items: center;
    }
    .dist {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .dist-from {
      font-size: 10px;
      color: #bbb;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 9px;
    }
    .tag {
      background: var(--sand);
      color: var(--ocean-mid);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
    }
    .tag.star {
      background: var(--accent);
      color: white;
      font-weight: 500;
    }

    .hours { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
    .hours-row { display:flex; gap:6px; align-items:baseline; }
    .meal-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--ocean-mid);
      background: rgba(42,85,104,0.08);
      padding: 1px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .note {
      font-size: 11px;
      color: var(--accent-soft);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(224,94,46,0.13);
      line-height: 1.6;
    }

    .empty {
      text-align:center; color:var(--text-muted);
      font-size:13px; padding:40px 0;
    }

    /* ── EDIT TIP ── */
    .edit-tip {
      background: #0f2028;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      padding: 9px 16px;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }
    .edit-tip code {
      background: rgba(255,255,255,0.12);
      color: var(--accent-soft);
      font-family: monospace;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
    }

    footer {
      text-align:center; padding:18px;
      font-size:11px; color:var(--text-muted);
      letter-spacing:0.04em; line-height:1.6;
    }

    @media (min-width:480px) {
      .shop-name { font-size:19px; }
      main { padding:20px 20px 80px; }
    }
  </style>
</head>

let currentLang   = 'ja';
let currentFilter = 'all';

const CATEGORIES = [
  { id:'all',     label:{ ja:"すべて",    zh:"全部",    en:"All",          fr:"Tout" } },
  { id:'sea',     label:{ ja:"🐟 海鮮",   zh:"🐟 海鮮", en:"🐟 Seafood",    fr:"🐟 Fruits de mer" } },

  { id:'izakaya', label:{ ja:"🍶 居酒屋", zh:"🍶 居酒屋",en:"🍶 Izakaya",   fr:"🍶 Izakaya" } },
  { id:'beef',    label:{ ja:"🥩 隠岐牛", zh:"🥩 隱岐牛",en:"🥩 Oki Beef",  fr:"🥩 Bœuf d'Oki" } },
  { id:'takeout', label:{ ja:"🍱 テイクアウト",zh:"🍱 外帶",en:"🍱 Takeout",fr:"🍱 À emporter" } },
];

function formatDate(d, lang) {
  if (lang === 'ja') {
    const days = ["日","月","火","水","木","金","土"];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  }
  if (lang === 'zh') {
    const days = ["日","一","二","三","四","五","六"];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（週${days[d.getDay()]}）`;
  }
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  return d.toLocaleDateString(lang === 'fr' ? 'fr-FR' : 'en-US', opts);
}

function buildCard(shop, isOpen, lang) {
  const L = lang;
  const i = I18N[L];
  const m = shop.menu[L];
  const h = shop.hours;

  const tags = m.items.map(item =>
    `<span class="tag${item===m.star?' star':''}">${item}</span>`
  ).join('');

  let hoursHtml = '';
  if (h.lunch)  hoursHtml += `<div class="hours-row"><span class="meal-label">${i.lunch}</span> ${h.lunch[L]}</div>`;
  if (h.dinner) hoursHtml += `<div class="hours-row"><span class="meal-label">${i.dinner}</span> ${h.dinner[L]}</div>`;

  const note = shop.note
    ? `<div class="note">※ ${shop.note[L]}</div>` : '';
  const pill = isOpen
    ? `<span class="status-pill pill-open">${i.open}</span>`
    : `<span class="status-pill pill-closed">${i.closed}</span>`;

  return `
    <div class="card${isOpen?'':' closed'}">
      <div class="card-top">
        <div class="shop-name">${shop.name}</div>
        ${pill}
      </div>
      <div class="dists">
        <span class="dist">🚶 ${i.walk} ${shop.dist.walk}${i.min}</span>
        <span class="dist">🚲 ${i.bike} ${shop.dist.bike}${i.min}</span>
        <span class="dist">🚗 ${i.car} ${shop.dist.car}${i.min}</span>
        <span class="dist dist-from">${i.fromPort}</span>
      </div>
      <div class="tags">${tags}</div>
      <div class="hours">${hoursHtml}</div>
      ${note}
    </div>`;
}

function render() {
  const L = currentLang;
  const i = I18N[L];
  const today = new Date();

  const openShops   = SHOPS.filter(s => TODAY_OPEN.includes(s.id));
  const closedShops = SHOPS.filter(s => !TODAY_OPEN.includes(s.id));

  // static text
  document.getElementById('site-title').textContent    = i.siteTitle;
  document.getElementById('site-subtitle').textContent = i.siteSubtitle;
  document.getElementById('today-date').textContent    = formatDate(today, L);
  document.getElementById('open-badge').textContent    = i.openBadge(openShops.length);
  document.getElementById('edit-tip').innerHTML        = i.editTip(TODAY_OPEN.length);
  document.getElementById('footer-text').textContent   = i.footer;
  document.documentElement.lang = L === 'zh' ? 'zh-TW' : L;

  // tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const cat = CATEGORIES.find(c => c.id === btn.dataset.filter);
    if (cat) btn.textContent = cat.label[L];
  });

  // lang buttons
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === L)
  );

  // filter
  const fOpen   = currentFilter==='all' ? openShops   : openShops.filter(s=>s.category===currentFilter);
  const fClosed = currentFilter==='all' ? closedShops : closedShops.filter(s=>s.category===currentFilter);

  let html = '';
  if (fOpen.length) {
    html += `<div class="section-label">${i.openSection}</div>`;
    fOpen.forEach(s => { html += buildCard(s, true, L); });
  } else {
    html += `<div class="empty">${i.noOpen}</div>`;
  }
  if (fClosed.length && currentFilter==='all') {
    html += `<div class="section-label" style="margin-top:28px">${i.closedSection}</div>`;
    fClosed.forEach(s => { html += buildCard(s, false, L); });
  }
  document.getElementById('cards-container').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(); });
  });
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });
  render();
});
</script>
